services:
  - type: web
    name: research-engine-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /api/research
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: HF_MODEL
        value: meta-llama/Llama-3.1-8B-Instruct:novita
      - key: LLM_PROVIDER
        value: huggingface
      - key: EXA_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: LLM_TEMPERATURE
        value: "0.3"
      - key: LLM_MAX_TOKENS
        value: "8196"
      - key: OUTPUT_FILE
        value: research_report.md
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.7

  - type: web
    name: research-engine-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false